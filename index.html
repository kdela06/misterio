<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Misterio en el Museo - Edición de Rol</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Fredoka', 'sans-serif'], 
                    },
                    colors: {
                        rpgBg: '#4A3F35',       
                        rpgCard: '#DFD5BF',     
                        rpgInner: '#CEBFB3',    
                        rpgBorder: '#2B2520',   
                        rpgText: '#211C18',     
                        rpgGreen: '#59824C',    
                        rpgRed: '#913F36',      
                        rpgYellow: '#BFA36B',   
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-rpgBg text-rpgText min-h-screen font-sans selection:bg-rpgRed selection:text-white">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const SUPABASE_URL = "https://ybbbfuysdagbojvfsxbu.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InliYmJmdXlzZGFnYm9qdmZzeGJ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0NDg3OTIsImV4cCI6MjA5OTAyNDc5Mn0.5lV-FQS8rys6DwlAyGvVkbbOjjDbKLJJNkNxoLWrUQo";
        
        const clienteSupabase = (SUPABASE_URL !== "TU_URL_DE_SUPABASE_AQUI" && window.supabase) 
            ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) 
            : null;

        const MAPEO_IMAGENES = {
            "El Vigilante": "Gemini_Generated_Image_f2k2dnf2k2dnf2k2.png",
            "El Historiador": "Gemini_Generated_Image_9dbby59dbby59dbb.png",
            "La Restauradora": "Gemini_Generated_Image_b91g20b91g20b91g.png",
            "El Guía Turístico": "Gemini_Generated_Image_dg12zndg12zndg12.png",
            "El Electricista": "Gemini_Generated_Image_azfu7kazfu7kazfu.png"
        };

        const INITIAL_ROLES = {
            "vigilante77": { name: "El Vigilante", alignment: "No culpable", story: "Llevas 10 años vigilando. Te quedaste dormido tras tomar té.", alibi: "En la cabina de control analógica.", microA: "Destello Eléctrico", microD: "Escudo de Seguridad", microE: "Cámara Analógica" },
            "historia33": { name: "El Historiador", alignment: "Cómplice", story: "Crees que el museo trata las reliquias como juguetes.", alibi: "Catalogando manuscritos en el sótano.", microA: "Crítica Académica", microD: "Cúpula Documental", microE: "Análisis de Firmas" },
            "pincel99": { name: "La Restauradora", alignment: "Ladrón", story: "Eres el autor material del robo. Necesitas energía oculta para tus proyectos mecánicos.", alibi: "Cerrada con llave usando químicos tóxicos.", microA: "Disolvente Químico", microD: "Capa Blindada", microE: "Firma Falsa de Radio" },
            "brujula22": { name: "El Guía Turístico", alignment: "No culpable", story: "Conoces los pasadizos secretos y conductos de ventilación.", alibi: "Buscando un llavero en el jardín a oscuras.", microA: "Atajo Sorpresa", microD: "Trampilla de Escape", microE: "Mapa del Terreno" },
            "cable11": { name: "El Electricista", alignment: "No culpable", story: "Sabes cómo sabotear relés mecánicos para apagones.", alibi: "Reparando un cuadro de luces.", microA: "Sobrecarga Magnética", microD: "Aislamiento de Cobre", microE: "Diagnóstico de Red" }
        };

        const INITIAL_RESPUESTAS = {
            "El Vigilante": "Sin declaraciones registradas.",
            "El Historiador": "Sin declaraciones registradas.",
            "La Restauradora": "Sin declaraciones registradas.",
            "El Guía Turístico": "Sin declaraciones registradas.",
            "El Electricista": "Sin declaraciones registradas."
        };

        function App() {
            // Inicialización de estados desde localStorage para evitar pérdidas de datos al refrescar
            const [view, setView] = useState(() => localStorage.getItem('museo_view') || 'login');
            const [password, setPassword] = useState(() => localStorage.getItem('museo_password') || '');
            const [currentPlayer, setCurrentPlayer] = useState(() => {
                const guardado = localStorage.getItem('museo_player');
                return guardado ? JSON.parse(guardado) : null;
            });
            
            const [errorMsg, setErrorMsg] = useState('');
            const [isHoldingReveal, setIsHoldingReveal] = useState(false);
            const [roles, setRoles] = useState(INITIAL_ROLES);
            
            const [playersScores, setPlayersScores] = useState({
                "El Vigilante": 100, "El Historiador": 100, "La Restauradora": 100, "El Guía Turístico": 100, "El Electricista": 100
            });

            const [respuestasPantalla, setRespuestasPantalla] = useState(INITIAL_RESPUESTAS);
            const [liveQuestion, setLiveQuestion] = useState("Interrogatorio abierto. Responde a las preguntas verbales del Historiador.");
            
            const [resultadoDado, setResultadoDado] = useState(null);
            const [consejoDado, setConsejoDado] = useState('');
            const [targetPersona, setTargetPersona] = useState('El Vigilante');
            const [inputRespuestaTexto, setInputRespuestaTexto] = useState('');
            const [showRoleEditor, setShowRoleEditor] = useState(false);

            // Efectos para sincronizar de manera automática los cambios de estado en el almacenamiento local
            useEffect(() => {
                localStorage.setItem('museo_view', view);
            }, [view]);

            useEffect(() => {
                localStorage.setItem('museo_password', password);
            }, [password]);

            useEffect(() => {
                if (currentPlayer) {
                    localStorage.setItem('museo_player', JSON.stringify(currentPlayer));
                } else {
                    localStorage.removeItem('museo_player');
                }
            }, [currentPlayer]);

            useEffect(() => {
                if (!clienteSupabase) return;

                clienteSupabase.from('juego_museo').select('*').eq('id', 'partida_1').single().then(({ data }) => {
                    if (data) {
                        if (data.roles_json) setRoles(data.roles_json);
                        if (data.pregunta_actual) setLiveQuestion(data.pregunta_actual);
                        if (data.scores_json) setPlayersScores(data.scores_json);
                        if (data.respuestas_json) setRespuestasPantalla(data.respuestas_json);
                    }
                });

                const channel = clienteSupabase.channel('cambios-museo')
                    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'juego_museo' }, payload => {
                        if (payload.new.roles_json) setRoles(payload.new.roles_json);
                        if (payload.new.pregunta_actual) setLiveQuestion(payload.new.pregunta_actual);
                        if (payload.new.scores_json) setPlayersScores(payload.new.scores_json);
                        if (payload.new.respuestas_json) setRespuestasPantalla(payload.new.respuestas_json);
                    })
                    .subscribe();

                return () => { clienteSupabase.removeChannel(channel); };
            }, []);

            useEffect(() => {
                if (currentPlayer) {
                    const matchedRole = Object.values(roles).find(r => r.name === currentPlayer.name);
                    if (matchedRole) setCurrentPlayer(matchedRole);
                }
            }, [roles]);

            const enviarAlServidor = async (nuevosRoles, nuevaPregunta, nuevosScores, nuevasRespuestas) => {
                if (!clienteSupabase) return;
                await clienteSupabase.from('juego_museo').update({
                    roles_json: nuevosRoles,
                    pregunta_actual: nuevaPregunta,
                    scores_json: nuevosScores,
                    respuestas_json: nuevasRespuestas
                }).eq('id', 'partida_1');
            };

            const lanzarDadoD20 = () => {
                const valor = Math.floor(Math.random() * 20) + 1;
                setResultadoDado(valor);
                if (valor >= 14) {
                    setConsejoDado("Resultado Alto: Tienes ventaja. Puedes gastar poca vida para mentir o ser muy sincero y protegerte.");
                } else if (valor >= 7) {
                    setConsejoDado("Resultado Medio: Mentir de forma parcial te costará una cantidad moderada de vida.");
                } else {
                    setConsejoDado("Resultado Bajo: Mentir te costará mucha vida. Es más seguro responder con sinceridad total.");
                }
            };

            const modificarVidaDesdeMaster = (nombrePersona, delta) => {
                const nuevosScores = {
                    ...playersScores,
                    [nombrePersona]: Math.max(0, Math.min(100, playersScores[nombrePersona] + delta))
                };
                setPlayersScores(nuevosScores);
                enviarAlServidor(roles, liveQuestion, nuevosScores, respuestasPantalla);
            };

            const guardarRespuestaIndividual = () => {
                const nuevasRespuestas = {
                    ...respuestasPantalla,
                    [targetPersona]: inputRespuestaTexto.trim() || "Sin declaraciones registradas."
                };
                setRespuestasPantalla(nuevasRespuestas);
                setInputRespuestaTexto('');
                enviarAlServidor(roles, liveQuestion, playersScores, nuevasRespuestas);
            };

            const reiniciarFichasVerbales = () => {
                setRespuestasPantalla(INITIAL_RESPUESTAS);
                enviarAlServidor(roles, liveQuestion, playersScores, INITIAL_RESPUESTAS);
            };

            const updateRoleField = (key, field, value) => {
                const nuevosRoles = {
                    ...roles,
                    [key]: { ...roles[key], [field]: value }
                };
                setRoles(nuevosRoles);
            };

            const handleLogout = () => {
                localStorage.removeItem('museo_view');
                localStorage.removeItem('museo_password');
                localStorage.removeItem('museo_player');
                setCurrentPlayer(null);
                setPassword('');
                setView('login');
                setResultadoDado(null);
                setConsejoDado('');
            };

            const handleLogin = (e) => {
                e.preventDefault();
                setErrorMsg('');
                const cleanPass = password.trim();

                if (cleanPass === 'Chispitas14') {
                    setView('narrator');
                } else if (roles[cleanPass]) {
                    setCurrentPlayer(roles[cleanPass]);
                    setView('player');
                } else {
                    setErrorMsg('Código de terminal incorrecto.');
                }
            };

            const CuadriculaPersonajes = () => (
                <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4 my-4">
                    {Object.values(roles).map((p) => {
                        const estaMuerto = playersScores[p.name] <= 0;
                        return (
                            <div key={p.name} className={`bg-rpgCard border-4 border-rpgBorder rounded-xl p-3 flex flex-col justify-between shadow-[4px_4px_0_0_#2b2520] transition-all ${estaMuerto ? 'opacity-50 saturate-50' : ''}`}>
                                <div>
                                    <div className="relative bg-white/40 border-2 border-rpgBorder rounded-lg overflow-hidden aspect-[3/4] mb-2 flex items-center justify-center">
                                        <img src={MAPEO_IMAGENES[p.name]} alt={p.name} className="w-full h-full object-cover" />
                                        {estaMuerto && (
                                            <div className="absolute inset-0 bg-rpgRed/70 flex items-center justify-center">
                                                <span className="text-white font-black text-lg tracking-wider border-4 border-white px-2 py-1 rotate-[-12deg]">CONFESADO</span>
                                            </div>
                                        )}
                                    </div>
                                    <h4 className="font-black text-sm text-rpgText text-center uppercase tracking-tight">{p.name}</h4>
                                    
                                    <div className="mt-1.5 bg-rpgBg border-2 border-rpgBorder h-4 rounded overflow-hidden relative">
                                        <div 
                                            className="bg-rpgRed h-full transition-all duration-300"
                                            style={{ width: `${playersScores[p.name] || 0}%` }}
                                        ></div>
                                        <div className="absolute inset-0 flex items-center justify-center text-[10px] font-black text-white">
                                            HP: {playersScores[p.name] || 0}/100
                                        </div>
                                    </div>
                                </div>

                                <div className="mt-3 p-2 bg-rpgInner rounded border-2 border-rpgBorder min-h-[60px] text-xs">
                                    <span className="block font-black text-[9px] uppercase text-rpgBg/70 mb-0.5">Último testimonio:</span>
                                    <p className="font-medium text-rpgText italic">"{respuestasPantalla[p.name] || 'Sin declaraciones.'}"</p>
                                </div>
                            </div>
                        );
                    })}
                </div>
            );

            return (
                <div className="max-w-7xl mx-auto px-2 py-4">
                    
                    {/* PANEL DE ICONOS Y RESPUESTAS BAJO ELLOS */}
                    {view !== 'login' && (
                        <div className="mb-6">
                            <div className="bg-rpgBorder text-rpgCard px-4 py-2 rounded-t-xl font-black text-xs uppercase tracking-widest flex items-center gap-2">
                                <svg className="w-4 h-4 stroke-rpgCard fill-none" strokeWidth="2.5" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
                                Estado General de la Investigation
                            </div>
                            <div className="bg-rpgBg/30 border-x-4 border-b-4 border-rpgBorder p-4 rounded-b-xl">
                                <CuadriculaPersonajes />
                            </div>
                        </div>
                    )}

                    {/* LOGIN DE TERMINALES */}
                    {view === 'login' && (
                        <div className="max-w-md mx-auto mt-16 bg-rpgCard border-4 border-rpgBorder rounded-xl p-6 shadow-[5px_5px_0_0_#2b2520]">
                            <div className="text-center mb-6">
                                <h2 className="text-xl font-black uppercase text-rpgText">Consola Arqueológica</h2>
                                <p className="text-xs font-bold text-rpgBorder/80 mt-1">Ingresa el código cifrado de tu dispositivo</p>
                            </div>

                            <form onSubmit={handleLogin} className="space-y-4">
                                <input 
                                    type="password" 
                                    placeholder="Código secreto" 
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    className="w-full bg-rpgInner border-4 border-rpgBorder rounded-lg px-3 py-2.5 text-center text-lg font-black tracking-widest text-rpgText focus:outline-none"
                                />
                                {errorMsg && <p className="bg-rpgRed text-white border-2 border-rpgBorder rounded p-2 text-xs text-center font-bold">{errorMsg}</p>}
                                <button type="submit" className="w-full bg-rpgGreen border-4 border-rpgBorder text-white font-black uppercase text-md py-3 rounded-lg shadow-[0_4px_0_0_#2b2520] active:translate-y-[4px] active:shadow-none transition-all">
                                    Enlazar Frecuencia
                                </button>
                            </form>
                        </div>
                    )}

                    {/* TERMINAL DEL PARTICIPANTE / ALUMNO */}
                    {view === 'player' && currentPlayer && (
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                            
                            <div className="lg:col-span-8 bg-rpgCard border-4 border-rpgBorder rounded-xl p-5 space-y-4 shadow-[5px_5px_0_0_#2b2520]">
                                
                                <div className="flex flex-col sm:flex-row justify-between sm:items-center border-b-4 border-rpgBorder/20 pb-3 gap-2">
                                    <div>
                                        <span className="text-[10px] font-black uppercase bg-rpgBorder px-2 py-0.5 rounded text-white">Dispositivo enlazado</span>
                                        <h2 className="text-2xl font-black text-rpgText mt-0.5">{currentPlayer.name}</h2>
                                    </div>
                                    <div className="bg-rpgInner/60 border-2 border-rpgBorder rounded-lg p-2 min-w-[220px]">
                                        <span className="block text-[9px] font-black uppercase text-rpgBg/80">Condición Secreta en el Caso:</span>
                                        <h3 className="text-md font-black text-rpgRed tracking-wide mt-0.5">
                                            {isHoldingReveal ? currentPlayer.alignment : "[Mantén presionado el botón]"}
                                        </h3>
                                    </div>
                                    <button 
                                        onMouseDown={() => setIsHoldingReveal(true)} onMouseUp={() => setIsHoldingReveal(false)}
                                        onTouchStart={() => setIsHoldingReveal(true)} onTouchEnd={() => setIsHoldingReveal(false)}
                                        className="bg-rpgYellow border-2 border-rpgBorder text-rpgText font-black text-xs uppercase px-4 py-2.5 rounded shadow-[0_3px_0_0_#2b2520] active:translate-y-[3px] active:shadow-none select-none flex-shrink-0"
                                    >
                                        Revelar Rol Secreto
                                    </button>
                                </div>

                                {playersScores[currentPlayer.name] <= 0 ? (
                                    <div className="bg-rpgRed border-4 border-rpgBorder rounded-lg p-4 text-white text-center animate-pulse">
                                        <h3 className="font-black text-lg uppercase">Te has quedado sin resistencia</h3>
                                        <p className="text-xs font-bold mt-1">Has perdido tus puntos vitales. Tienes que reconocer abiertamente tu rol real ante el Narrador.</p>
                                    </div>
                                ) : (
                                    <div className="bg-rpgInner/40 p-3 rounded-lg border-2 border-rpgBorder flex justify-between items-center">
                                        <span className="text-xs font-black uppercase text-rpgText">Resistencia actual en el caso:</span>
                                        <span className="text-md font-black bg-white border-2 border-rpgBorder px-3 py-0.5 rounded text-rpgRed">
                                            {playersScores[currentPlayer.name]} / 100 HP
                                        </span>
                                    </div>
                                )}

                                <div className="space-y-1">
                                    <h4 className="text-xs font-black uppercase text-rpgText">Situación Actual del Turno:</h4>
                                    <p className="font-bold text-xs bg-white border-2 border-rpgBorder p-3 rounded-lg text-rpgText">
                                        {liveQuestion}
                                    </p>
                                </div>

                                {/* GESTOR DE VERACIDAD CON DADO */}
                                <div className="bg-amber-50 border-2 border-rpgBorder rounded-lg p-4 space-y-3">
                                    <div className="flex flex-col sm:flex-row justify-between items-center gap-3">
                                        <div>
                                            <h4 className="text-xs font-black uppercase text-rpgText">Mecánica de Sinceridad y Engaño</h4>
                                            <p className="text-[11px] text-rpgText/80 font-medium">Gira el dado antes de responder. Puedes negociar con el Narrador para perder HP a cambio de dar una respuesta incorrecta/mentira, o arriesgarte con la verdad.</p>
                                        </div>
                                        <button 
                                            onClick={lanzarDadoD20}
                                            disabled={playersScores[currentPlayer.name] <= 0}
                                            className="bg-rpgBg text-white border-2 border-rpgBorder font-black text-xs uppercase px-3 py-2 rounded shadow-[0_3px_0_0_#2b2520] active:translate-y-[3px] active:shadow-none disabled:opacity-50"
                                        >
                                            Girar d20
                                        </button>
                                    </div>

                                    {resultadoDado && (
                                        <div className="bg-white p-2.5 rounded border-2 border-rpgBorder flex items-center gap-3">
                                            <div className="w-10 h-10 bg-rpgRed text-white border-2 border-rpgBorder rounded font-black text-lg flex items-center justify-center flex-shrink-0">
                                                {resultadoDado}
                                            </div>
                                            <p className="text-xs font-bold text-rpgText">{consejoDado}</p>
                                        </div>
                                    )}
                                </div>

                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 text-xs">
                                    <div className="p-3 bg-rpgInner rounded border-2 border-rpgBorder">
                                        <span className="block font-black uppercase text-rpgBg/80 mb-1">Trasfondo Secreto:</span>
                                        <p className="font-medium">{currentPlayer.story}</p>
                                    </div>
                                    <div className="p-3 bg-rpgBg text-white rounded border-2 border-rpgBorder">
                                        <span className="block font-black uppercase text-rpgCard/80 mb-1">Coartada Argumental Base:</span>
                                        <p className="font-medium italic">"{currentPlayer.alibi}"</p>
                                    </div>
                                </div>
                            </div>

                            <div className="lg:col-span-4 bg-rpgCard border-4 border-rpgBorder rounded-xl p-4 space-y-4 shadow-[5px_5px_0_0_#2b2520] h-fit">
                                <h3 className="font-black text-sm uppercase border-b-2 border-rpgBorder/20 pb-1 text-rpgText">Acciones Micro:bit</h3>
                                <p className="text-[10px] font-medium text-rpgText/70">Anuncia verbalmente al profesor el uso de estas opciones para modular el interrogatorio.</p>
                                
                                <div className="space-y-2 text-xs">
                                    <div className="p-2 bg-rpgInner rounded border-2 border-rpgBorder">
                                        <span className="font-black text-rpgRed uppercase">Ataque / Interrupción [Botón A]:</span>
                                        <p className="font-bold text-rpgText">{currentPlayer.microA}</p>
                                    </div>
                                    <div className="p-2 bg-rpgInner rounded border-2 border-rpgBorder">
                                        <span className="font-black text-blue-800 uppercase">Defensa / Desvío [Botón B]:</span>
                                        <p className="font-bold text-rpgText">{currentPlayer.microD}</p>
                                    </div>
                                    <div className="p-2 bg-rpgInner rounded border-2 border-rpgBorder">
                                        <span className="font-black text-rpgGreen uppercase">Escaneo / Análisis [Botón E]:</span>
                                        <p className="font-bold text-rpgText">{currentPlayer.microE}</p>
                                    </div>
                                </div>

                                <button onClick={handleLogout} className="w-full bg-rpgBg text-white font-black text-xs py-2 rounded shadow">
                                    Desconectar Dispositivo
                                </button>
                            </div>
                        </div>
                    )}

                    {/* CONSOLA COMPLETA DEL NARRADOR */}
                    {view === 'narrator' && (
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                            
                            <div className="lg:col-span-8 bg-rpgCard border-4 border-rpgBorder rounded-xl p-5 space-y-5 shadow-[5px_5px_0_0_#2b2520]">
                                <div className="flex justify-between items-center border-b-2 border-rpgBorder/20 pb-2">
                                    <h3 className="font-black text-lg text-rpgText uppercase">Consola Maestra del Historiador</h3>
                                    <button 
                                        onClick={() => enviarAlServidor(roles, liveQuestion, playersScores, respuestasPantalla)}
                                        className="bg-rpgGreen text-white font-black text-xs px-4 py-2 rounded border-2 border-rpgBorder shadow"
                                    >
                                        Emitir Cambios a Pizarra
                                    </button>
                                </div>

                                <div className="space-y-1">
                                    <label className="block text-xs font-black uppercase text-rpgText">Situación o Suceso Actual:</label>
                                    <textarea 
                                        value={liveQuestion}
                                        onChange={(e) => setLiveQuestion(e.target.value)}
                                        className="w-full bg-white border-2 border-rpgBorder rounded-lg p-2 text-xs font-bold text-rpgText focus:outline-none"
                                        rows="2"
                                    />
                                </div>

                                <div className="p-3 bg-amber-50 border-2 border-rpgBorder rounded-lg space-y-3">
                                    <label className="block text-xs font-black uppercase text-rpgText">Registrar Última Respuesta Verbal en la Pizarra:</label>
                                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-2">
                                        <select 
                                            value={targetPersona} 
                                            onChange={(e) => setTargetPersona(e.target.value)}
                                            className="bg-white border-2 border-rpgBorder rounded p-1.5 text-xs font-bold text-rpgText"
                                        >
                                            {Object.values(roles).map(r => <option key={r.name} value={r.name}>{r.name}</option>)}
                                        </select>
                                        <input 
                                            type="text" 
                                            value={inputRespuestaTexto}
                                            onChange={(e) => setInputRespuestaTexto(e.target.value)}
                                            placeholder="Escribe la coartada o respuesta del alumno..."
                                            className="sm:col-span-2 bg-white border-2 border-rpgBorder rounded p-1.5 text-xs font-semibold text-rpgText focus:outline-none"
                                        />
                                    </div>
                                    <div className="flex justify-between items-center pt-1">
                                        <button onClick={reiniciarFichasVerbales} className="text-[10px] font-black text-rpgRed underline uppercase">Limpiar Todas las Respuestas</button>
                                        <button onClick={guardarRespuestaIndividual} className="bg-rpgBg text-white border-2 border-rpgBorder px-4 py-1 rounded text-xs font-black uppercase">Fijar Respuesta</button>
                                    </div>
                                </div>

                                <div className="pt-2 border-t-2 border-rpgBorder/20">
                                    <button 
                                        onClick={() => setShowRoleEditor(!showRoleEditor)}
                                        className="w-full bg-rpgInner border-2 border-rpgBorder text-rpgText font-black uppercase text-xs p-2.5 rounded flex justify-between items-center"
                                    >
                                        <span>Configurar Historias de Fondo, Coartadas y Alineación</span>
                                        <svg className={`w-4 h-4 transform transition-transform ${showRoleEditor ? 'rotate-180' : ''}`} fill="none" stroke="currentColor" strokeWidth="3" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7"/></svg>
                                    </button>

                                    {showRoleEditor && (
                                        <div className="mt-3 space-y-4 max-h-[350px] overflow-y-auto pr-1">
                                            {Object.keys(roles).map((key) => (
                                                <div key={key} className="bg-rpgBg p-3 rounded border-2 border-rpgBorder space-y-3 text-white text-xs">
                                                    <div className="flex justify-between items-center border-b border-white/20 pb-1.5">
                                                        <span className="font-black text-rpgYellow text-sm">{roles[key].name}</span>
                                                        <select 
                                                            value={roles[key].alignment}
                                                            onChange={(e) => updateRoleField(key, 'alignment', e.target.value)}
                                                            className="bg-white text-rpgText font-black text-[10px] rounded px-2 py-0.5"
                                                        >
                                                            <option value="No culpable">No culpable</option>
                                                            <option value="Ladrón">Ladrón</option>
                                                            <option value="Cómplice">Cómplice</option>
                                                        </select>
                                                    </div>
                                                    
                                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 text-rpgText">
                                                        <div className="flex flex-col gap-1">
                                                            <label className="text-[10px] font-black uppercase text-rpgYellow">Historia de Fondo:</label>
                                                            <textarea 
                                                                value={roles[key].story}
                                                                onChange={(e) => updateRoleField(key, 'story', e.target.value)}
                                                                className="w-full bg-white border rounded p-1.5 text-[11px] font-medium focus:outline-none"
                                                                rows="2"
                                                            />
                                                        </div>
                                                        <div className="flex flex-col gap-1">
                                                            <label className="text-[10px] font-black uppercase text-rpgYellow">Coartada Inicial:</label>
                                                            <textarea 
                                                                value={roles[key].alibi}
                                                                onChange={(e) => updateRoleField(key, 'alibi', e.target.value)}
                                                                className="w-full bg-white border rounded p-1.5 text-[11px] font-medium focus:outline-none"
                                                                rows="2"
                                                            />
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>

                            {/* GESTIÓN DE SALUD / DAÑO DESDE EL MASTER */}
                            <div className="lg:col-span-4 bg-rpgCard border-4 border-rpgBorder rounded-xl p-4 space-y-3 shadow-[5px_5px_0_0_#2b2520] h-fit">
                                <h3 className="font-black text-sm uppercase border-b-2 border-rpgBorder/20 pb-1 text-rpgText">Modificador de HP</h3>
                                <p className="text-[10px] font-medium text-rpgText/70">Resta puntos si responden incorrectamente o si mienten de forma arriesgada.</p>
                                
                                <div className="space-y-2">
                                    {Object.keys(playersScores).map((name) => (
                                        <div key={name} className="p-2 bg-rpgInner rounded border-2 border-rpgBorder flex flex-col gap-1">
                                            <span className="text-xs font-black text-rpgText uppercase">{name}</span>
                                            <div className="flex items-center justify-between bg-rpgBg rounded p-1">
                                                <button onClick={() => modificarVidaDesdeMaster(name, -10)} className="bg-rpgRed text-white text-xs font-black px-2 py-0.5 rounded">-10 HP</button>
                                                <span className="text-xs font-black text-white">{playersScores[name]}/100</span>
                                                <button onClick={() => modificarVidaDesdeMaster(name, 10)} className="bg-rpgGreen text-white text-xs font-black px-2 py-0.5 rounded">+10 HP</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <button onClick={handleLogout} className="w-full bg-rpgBg text-white font-black text-xs py-2 rounded uppercase mt-2">
                                    Salir del Panel
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
